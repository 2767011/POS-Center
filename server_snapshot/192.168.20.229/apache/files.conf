<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/files
    Alias /admin /var/www/files/admin.php
    <Directory /var/www/files>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
        IndexOptions FancyIndexing FoldersFirst NameWidth=* DescriptionWidth=*
        IndexOrderDefault Ascending Name
        IndexIgnore .admin_password admin.php .lang .trash .settings.json
    </Directory>
    <Directory /var/www/files/.lang>
        Require all denied
    </Directory>
    <Directory /var/www/files/.trash>
        Require all denied
    </Directory>
    <FilesMatch "^(\.admin_password|\.settings\.json)$">
        Require all denied
    </FilesMatch>
    ErrorLog ${APACHE_LOG_DIR}/files-error.log
    CustomLog ${APACHE_LOG_DIR}/files-access.log combined
</VirtualHost>
